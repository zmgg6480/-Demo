<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 文春小报模拟器 📰</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas for image download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts: Noto Serif JP, Noto Sans JP and Zen Old Mincho -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&family=Zen+Old+Mincho:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #E9E5E2;
            --accent-tan: #C6B6A6;
            --line-green: #06C755;
            --dark-slate: #44515A;
        }
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: var(--bg-color);
            color: #333;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .serif { font-family: 'Georgia', 'Noto Serif JP', serif; }
        
        /* Neumorphic Shadows */
        .neu-shadow { box-shadow: 20px 20px 60px #c6c3c0, -20px -20px 60px #ffffff; }
        .neu-button { box-shadow: 5px 5px 15px #d1cdca, -5px -5px 15px #ffffff; }
        .neu-inset { box-shadow: inset 5px 5px 10px #d1cdca, inset -5px -5px 10px #ffffff; }

        /* Watermark Overlay */
        .watermark-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 30;
            opacity: 0.2;
            transform: rotate(-25deg);
            font-size: 3.5rem;
            white-space: nowrap;
            color: white;
            font-family: 'Georgia', 'Noto Serif JP', serif;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; background: #E8E4E0; height: 6px; border-radius: 10px; outline: none; border: none; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 22px; height: 22px; 
            border-radius: 50%; background: var(--accent-tan); cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            border: 2px solid white;
        }

        /* Forms Styling */
        .input-base { width: 100%; background: white; border: none; border-radius: 14px; padding: 12px 16px; font-size: 13px; outline: none; transition: all 0.2s; }
        .label-base { font-size: 10px; font-weight: bold; color: #999; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; display: block; }
        .segmented-btn { flex: 1; padding: 10px 0; font-size: 11px; font-weight: bold; transition: all 0.2s; border-radius: 99px; }
        .segmented-btn.active { background: var(--accent-tan); color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .segmented-btn.inactive { color: #999; }

        /* Quote Quick Fill Buttons */
        .quote-btn { padding: 8px 14px; font-size: 11px; font-weight: bold; border-radius: 10px; background: #e0dbd8; color: #666; transition: all 0.1s; }
        .quote-btn:hover { background: #d6cfcb; }
        .quote-btn:active { background: var(--accent-tan); color: white; transform: translateY(1px); }

        /* Responsive Width Container for Preview */
        .preview-panel {
            width: 100%;
            max-width: 368px; 
            flex-shrink: 0;
        }
        @media (max-width: 768px) {
            .preview-panel {
                max-width: 480px; /* Match control panel max-width on mobile */
            }
        }

        .staggered-header {
            font-family: 'Zen Old Mincho', 'SimSun', 'Noto Serif JP', serif;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

    <!-- Script -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script>
        const state = { workMode: 'same', gender: '男性2人', layout: 'single', blur: 25, wmSize: 56, wmPos: 'default' };
        const imageLayers = [null, { fg: null, bg: null, w: 0, h: 0 }, { fg: null, bg: null, w: 0, h: 0 }];

        // --- 初始化 MediaPipe Selfie Segmentation ---
        const selfieSegmentation = new SelfieSegmentation({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
        });
        selfieSegmentation.setOptions({ modelSelection: 1, selfiMode: false });
        
        let activeIdx = 1;
        selfieSegmentation.onResults((res) => generateLayers(res, activeIdx));

        // --- Watermark Sizing ---
        document.getElementById('wm-range').addEventListener('input', (e) => {
            const size = e.target.value;
            state.wmSize = size;
            document.getElementById('wm-display').innerText = `${size}px`;
            if (imageLayers[1] && imageLayers[1].fg) drawComposite(1);
            if (imageLayers[2] && imageLayers[2].fg) drawComposite(2);
        });

        async function handleUpload(input, index) {
            console.log("handleUpload called with index:", index);
            const file = input.files[0];
            if (!file) return;
            activeIdx = index;
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = async () => {
                const placeholder = document.getElementById(`placeholder-${index}`);
                console.log("Placeholder found:", placeholder);
                if (placeholder) {
                    placeholder.innerText = "AI Processing...";
                } else {
                    console.error("Placeholder not found for index:", index);
                }
                await selfieSegmentation.send({ image: img });
            };
        }

        function generateLayers(results, idx) {
            console.log("generateLayers called with idx:", idx);
            const { image, segmentationMask } = results;
            const w = image.width, h = image.height;
            imageLayers[idx] = { w, h, originalImage: image, mask: segmentationMask };
            
            const placeholder = document.getElementById(`placeholder-${idx}`);
            if (placeholder) {
                placeholder.classList.add('hidden');
                document.getElementById(`slot-${idx}`).classList.remove('aspect-[4/3]');
            } else {
                console.error("Placeholder not found in generateLayers for idx:", idx);
            }
            const mainImg = document.getElementById(`main-img-${idx}`);
            if (mainImg) {
                mainImg.classList.add('hidden');
            }
            
            applyBlurToBackground(idx);
        }

        // --- 核心更新：高保真且适配移动端的文春质感虚化 ---
        function applyBlurToBackground(idx) {
            const data = imageLayers[idx];
            if (!data.originalImage) return;

            const dpr = window.devicePixelRatio || 1;
            const w = data.w;
            const h = data.h;
            
            // 1. FOREGROUND LAYER 
            // Feather subject mask edges with 8px soft blur to avoid harsh cutout artifacts
            const fgCanvas = document.createElement('canvas');
            fgCanvas.width = w; fgCanvas.height = h;
            const fgCtx = fgCanvas.getContext('2d');
            
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = w; maskCanvas.height = h;
            const maskCtx = maskCanvas.getContext('2d');
            maskCtx.filter = 'blur(8px)';
            maskCtx.drawImage(data.mask, 0, 0, w, h);
            maskCtx.filter = 'none';

            fgCtx.drawImage(maskCanvas, 0, 0, w, h);
            fgCtx.globalCompositeOperation = 'source-in';
            fgCtx.drawImage(data.originalImage, 0, 0, w, h);

            // Add subtle optical bloom around subject boundary
            fgCtx.globalCompositeOperation = 'screen';
            fgCtx.filter = 'blur(12px) opacity(0.3)';
            fgCtx.drawImage(fgCanvas, 0, 0, w, h);
            fgCtx.filter = 'none';
            fgCtx.globalCompositeOperation = 'source-over';

            imageLayers[idx].fg = fgCanvas;

            // 2. BACKGROUND LAYER
            // Downsampling: 0.25 scale (1/4 size) for performance
            const scale = 0.25;
            const smallW = Math.max(1, Math.floor(w * scale));
            const smallH = Math.max(1, Math.floor(h * scale));
            
            // Prepare an inpainted background without the subject to avoid halos
            const tempBg = document.createElement('canvas');
            tempBg.width = smallW; tempBg.height = smallH;
            const tCtx = tempBg.getContext('2d');
            
            // Draw scaled original
            tCtx.drawImage(data.originalImage, 0, 0, smallW, smallH);
            
            // Remove subject using mask
            tCtx.globalCompositeOperation = 'destination-out';
            tCtx.filter = 'blur(4px)';
            tCtx.drawImage(data.mask, 0, 0, smallW, smallH);
            tCtx.filter = 'none';
            
            // Fill hole with heavily blurred original behind it
            tCtx.globalCompositeOperation = 'destination-over';
            tCtx.filter = 'blur(20px)';
            tCtx.drawImage(data.originalImage, 0, 0, smallW, smallH);
            tCtx.filter = 'none';
            tCtx.globalCompositeOperation = 'source-over';

            // Apply background-only filter stack: blur() brightness(0.92) contrast(1.08) saturate(0.85)
            const smallCanvas = document.createElement('canvas');
            smallCanvas.width = smallW; smallCanvas.height = smallH;
            const smallCtx = smallCanvas.getContext('2d');
            
            // Blur strength adaptive formula
            const adaptiveRadius = Math.max(18, window.innerWidth * 0.04);
            const finalBlurRadius = adaptiveRadius * (state.blur / 25);
            const downsampledBlur = (finalBlurRadius * scale * dpr);
            
            smallCtx.drawImage(tempBg, 0, 0, smallW, smallH);
            smallCtx.filter = `blur(${Math.max(1, downsampledBlur)}px) brightness(0.92) contrast(1.08) saturate(0.85)`;
            smallCtx.drawImage(smallCanvas, 0, 0);
            
            // Scale background back to full resolution
            const bgCanvas = document.createElement('canvas');
            bgCanvas.width = w; bgCanvas.height = h;
            const bgCtx = bgCanvas.getContext('2d');
            bgCtx.drawImage(smallCanvas, 0, 0, w, h);

            imageLayers[idx].bg = bgCanvas;
            drawComposite(idx);
        }

        function drawWatermarkToCanvas(ctx, w, h) {
            if (state.wmPos === 'none') return;
            
            ctx.save();
            const dpr = window.devicePixelRatio || 1;
            const fontSize = state.wmSize * dpr;
            ctx.font = `900 ${fontSize}px Georgia, serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            let angle = 0;
            if (state.wmPos === 'left-45') angle = -45 * Math.PI / 180;
            else if (state.wmPos === 'right-45') angle = 45 * Math.PI / 180;
            
            ctx.translate(w / 2, h / 2);
            ctx.rotate(angle);

            // 1. Watermark layer with white color and inner shadow simulation using drop shadow
            ctx.globalAlpha = 0.45;
            ctx.fillStyle = "#FFFFFF";
            
            ctx.shadowColor = "rgba(70, 70, 70, 0.8)";
            ctx.shadowBlur = 4 * dpr;
            ctx.shadowOffsetX = 1.5 * dpr;
            ctx.shadowOffsetY = 1.5 * dpr;

            ctx.fillText("(C) 週刊文春", 0, 0);

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.restore();
        }

        function drawComposite(idx) {
            const data = imageLayers[idx];
            if (!data.fg || !data.bg) return;

            const targetCanvas = document.getElementById(`main-canvas-${idx}`);
            const canvasToUse = targetCanvas || document.createElement('canvas');
            if(!targetCanvas) { 
                canvasToUse.id = `main-canvas-${idx}`; 
                canvasToUse.className = "w-full h-auto block";
                document.getElementById(`slot-${idx}`).appendChild(canvasToUse); 
            }

            const ctx = canvasToUse.getContext('2d');
            const w = data.w, h = data.h;
            canvasToUse.width = w; canvasToUse.height = h;

            ctx.clearRect(0, 0, w, h);

            // Apply final global canvas post-processing
            ctx.filter = 'contrast(1.05) saturate(0.92)';

            // 1. 渲染背景
            ctx.drawImage(data.bg, 0, 0, w, h);

            // 2. 渲染主体
            ctx.drawImage(data.fg, 0, 0);
            
            ctx.filter = 'none';

            // Add Bunshun-like cinematic overlay
            const rx = w / 2;
            const ry = h / 2;
            // distinct radial vignette: transparent center -> rgba(0,0,0,0.45) edges
            const gradient = ctx.createRadialGradient(rx, ry, Math.min(rx, ry) * 0.4, rx, ry, Math.max(rx, ry) * 1.5);
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.45)');
            
            ctx.globalCompositeOperation = 'multiply';
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);

            // low-contrast diffusion haze & slight print softness
            ctx.globalCompositeOperation = 'screen';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.fillRect(0, 0, w, h);

            ctx.globalCompositeOperation = 'source-over';

            // 3. 渲染水印
            drawWatermarkToCanvas(ctx, w, h);
        }

        // --- 以下所有功能逻辑保持不变 ---
        ['input', 'touchmove'].forEach(evt => document.getElementById('blur-range').addEventListener(evt, (e) => {
            state.blur = parseInt(e.target.value);
            let label = 'px';
            if (state.blur > 80) label = 'px / 强力虚化'; else if (state.blur > 40) label = 'px / 自然';
            document.getElementById('blur-display').innerText = `${state.blur}${label}`;
            if (imageLayers[1] && imageLayers[1].originalImage) applyBlurToBackground(1);
            if (imageLayers[2] && imageLayers[2].originalImage) applyBlurToBackground(2);
        }));

        // --- Quotes Pool ---
        const quotesPool = {
            romantic: ["二人は共通の趣味をきっかけに意気投合。多忙なスケジュールの合間を縫って、都内の公園でデートを重ねる姿が目撃されている。", "撮影現場でも隠しきれない親密な様子を見せており、周囲からは「お似合いのカップル」と祝福の声が上がっている。"],
            home: ["関係者によると、二人はすでに都内の高級マンションで同棲生活を始めており、結婚を視野に入れた真剣交際だという。", "二人は互いの合鍵を持ち合う仲で、仕事終わりには必ずと言っていいほど同じ帰路につく姿を本誌が確認している。"],
            secret: ["深夜2時、変装した二人が時間差で隠れ家風のバーから出てくる姿をキャッチ。その後、二人は同じタクシーに乗り込み消えていった。", "雨が降りしきる中、周囲を警戒しながらマンションの裏口から入る二人の姿は、まさに「禁断の愛」そのものだった。"]
        };

        function switchTab(tab) {
            ['bg', 'text', 'watermark'].forEach(t => {
                document.getElementById(`panel-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "flex-1 py-3 text-gray-400 rounded-full text-[11px] font-black tracking-wider transition-all";
            });
            document.getElementById(`panel-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).className = "flex-1 py-3 bg-white rounded-full text-[11px] font-black tracking-wider shadow-sm neu-button text-gray-800";
        }

        function updatePreview() {
            const getVal = (id) => document.getElementById(id).value;
            const workA = getVal('input-work-a'), workB = getVal('input-work-b'), nameA = getVal('input-name-a'), ageA = getVal('input-age-a'), nameB = getVal('input-name-b'), ageB = document.getElementById('input-age-b').value, job = getVal('input-job'), desc = getVal('input-desc'), time = getVal('input-time'), media = '文春オンライン';
            const identity = `${state.gender}${job}${state.gender === '男女' ? '' : '2人'}`;
            let titleText = "";
            if (state.workMode === 'same') titleText = `『${workA}』の${identity}、${nameA}（${ageA}）と${nameB}（${ageB}）が熱愛中！`;
            else if (state.workMode === 'diff') titleText = `『${workA}』の${nameA}（${ageA}）と『${workB}』の${nameB}（${ageB}）が熱愛中！`;
            else titleText = `${nameA}（${ageA}）と${nameB}（${ageB}）が熱愛中！`;
            document.getElementById('preview-title').innerText = titleText;
            document.getElementById('preview-body').innerText = desc;
            document.getElementById('preview-time-display').innerText = time;
            document.getElementById('preview-footer-logo').innerText = media;
        }

        function setWorkMode(mode) {
            state.workMode = mode;
            ['same', 'diff', 'none'].forEach(m => document.getElementById(`mode-${m}`).className = `segmented-btn ${m === mode ? 'active' : 'inactive'}`);
            document.getElementById('box-work-b').classList.toggle('hidden', mode !== 'diff');
            document.getElementById('box-work-a').classList.toggle('hidden', mode === 'none');
            updatePreview();
        }

        function setGender(gen) {
            state.gender = gen;
            const mapping = {'男性2人': 'm', '女性2人': 'f', '男女': 'mf'};
            Object.keys(mapping).forEach(k => document.getElementById(`gen-${mapping[k]}`).className = `segmented-btn ${k === gen ? 'active' : 'inactive'}`);
            updatePreview();
        }

        function fillQuote(category) {
            document.getElementById('input-desc').value = quotesPool[category][Math.floor(Math.random() * quotesPool[category].length)];
            updatePreview();
        }

        function setLayout(mode) {
            state.layout = mode;
            document.getElementById('layout-s').className = `segmented-btn ${mode === 'single' ? 'active' : 'inactive'}`;
            document.getElementById('layout-d').className = `segmented-btn ${mode === 'double' ? 'active' : 'inactive'}`;
            document.getElementById('slot-2').classList.toggle('hidden', mode === 'single');
            
            // Toggle upload button visibility
            document.getElementById('upload-single').classList.toggle('hidden', mode === 'double');
            document.getElementById('upload-double').classList.toggle('hidden', mode === 'single');
            
            updatePreview();
        }

        function setWatermarkPos(pos) {
            state.wmPos = pos;
            
            // Update UI buttons
            const buttons = document.querySelectorAll('button[onclick^="setWatermarkPos"]');
            buttons.forEach(btn => {
                if (btn.getAttribute('onclick') === `setWatermarkPos('${pos}')`) {
                    btn.classList.add('text-blue-500');
                    btn.classList.remove('text-gray-600');
                } else {
                    btn.classList.remove('text-blue-500');
                    btn.classList.add('text-gray-600');
                }
            });

            if (imageLayers[1] && imageLayers[1].originalImage) drawComposite(1);                
            if (imageLayers[2] && imageLayers[2].originalImage) drawComposite(2);
        }

        async function downloadImage() {
            const node = document.querySelector("#capture-area");
            
            // Fix alignment during export
            const originalWidth = node.style.width;
            node.style.width = '375px'; 
            
            try {
                // scale: 3 for higher quality, backgroundColor: null for transparency
                // Ensure correct DPI usage with window.devicePixelRatio
                const dpr = window.devicePixelRatio || 2;
                const canvas = await html2canvas(node, { 
                    scale: dpr, 
                    useCORS: true, 
                    allowTaint: true, 
                    backgroundColor: null 
                });
                
                const link = document.createElement('a');
                link.download = `bunshun_scoop_${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } catch (err) { 
                console.error(err);
                alert("生成失败，请稍后重试"); 
            } finally {
                // Restore width
                node.style.width = originalWidth;
            }
        }

        ['input-work-a', 'input-work-b', 'input-job', 'input-name-a', 'input-age-a', 'input-name-b', 'input-age-b', 'input-desc', 'input-time'].forEach(id => document.getElementById(id).addEventListener('input', updatePreview));
        updatePreview();
        switchTab('bg');
    </script>
</body>
</html>
